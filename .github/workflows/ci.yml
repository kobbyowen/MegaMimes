name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.cfg }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        cfg: [Release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -DMEGA_BUILD_SHARED=ON
          -DMEGA_BUILD_CLI=ON
          -DMEGA_ENABLE_TESTS=ON
          -DCMAKE_BUILD_TYPE=${{ matrix.cfg }}

      - name: Build
        run: cmake --build build --config ${{ matrix.cfg }} -j

      - name: Run tests (ctest)
        run: |
          ctest --test-dir build -C ${{ matrix.cfg }} --output-on-failure -V
        shell: bash

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-${{ matrix.os }}-${{ matrix.cfg }}
          path: |
            build/Testing
            build/**/*.log
